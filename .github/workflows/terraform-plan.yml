
name: Terraform Plan

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]    

jobs:
  terraform:
    name: Terraform Plan
    runs-on: ubuntu-latest

    # PART 1: Update the environment block to include London
    env:
       AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
       AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
       AWS_REGION: 'eu-west-2' # This tells Terraform where to find your S3 backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Updated to v4 for better performance

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3 # Updated to v3 to fix STDOUT issues

      # PART 2: The "Bridge" step you must have before Validate
      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ./terraform
        # This downloads the AWS provider so 'validate' doesn't crash

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./terraform

      - name: Terraform Plan
        run: terraform plan -input=false
        working-directory: ./terraform
       